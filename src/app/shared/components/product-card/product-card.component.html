<div class="p-card">
  <a class="img-wrap" [routerLink]="['/producto', product.id]" (click)="openProduct()">
    <img [src]="product.imageUrl" [alt]="product.name" loading="lazy">
  </a>

  <div class="meta">
    <div class="code">Código {{ product.code }}</div>
    <a class="name name-link" [routerLink]="['/producto', product.id]" (click)="openProduct()">
      {{ product.name }}
    </a>
    <div class="price">{{ product.price | currency:'GTQ':'symbol':'1.0-0' }}</div>
    <div class="stock" *ngIf="product.stock != null && product.stock > 0">
      Disponible: {{ product.stock }}
    </div>
    <div class="stock stock-low" *ngIf="product.stock === 0">Consultar disponibilidad</div>

    <div class="quantity-controls">
      <button class="qty-btn" type="button" (click)="decreaseQuantity()" [disabled]="quantity <= 1">
        −
      </button>
      <span class="quantity">{{ quantity }}</span>
      <button class="qty-btn" type="button" (click)="increaseQuantity()">
        +
      </button>
    </div>

    <button class="btn btn-primary w100" type="button" (click)="addToCart()">
      Agregar
    </button>
  </div>
</div>
